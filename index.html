<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam argyle Incredible flex layout</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <div class="scroller-inputs">
      <input type="range" id="range-scroller" min="250" max="650" step="10">
      <output for="range-scroller"></output>
    </div>    

    <div class="layout-container">
      <form action="#" method="post">
        <div class="row">
          <label for="name">Name</label>
          <input type="text" name="name" id="name">
        </div>
        <div class="row">
          <label for="email">Email</label>
          <input type="email" name="email" id="email">
        </div>
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <script src="./range-scroller.js"></script>
</body>
</html>
